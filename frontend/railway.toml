[build]
builder = "RAILPACK"
buildEnvironment = "V3"
buildCommand = ""

[deploy]
runtime = "V2"
numReplicas = 1
sleepApplication = false
useLegacyStacker = false
ipv6EgressEnabled = false
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
startCommand = "vite --host 0.0.0.0 --port 3000"
preDeployCommand = "rm -rf node_modules/.vite"

[deploy.multiRegionConfig]
[deploy.multiRegionConfig.asia-southeast1-eqsg3a]
numReplicas = 1
